<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주원의 파스텔 코너</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <header class="profile-header card">
            <div class="profile-img-container">
                <img src="images/jogging.jpg" alt="주원의 산책 프로필" class="profile-img">
            </div>
            <h1>안녕하세요, 김주원입니다.</h1>
            <p class="motto">"자유로운 학생, 그리고 코딩하는 뜨개머리" 🎀</p>
        </header>

        <section class="info-section grid-container">
            <div class="info-box card">
                <h3>I am...</h3>
                <ul>
                    <li>🎓 a student</li>
                    <li>💻 a programmer</li>
                    <li>🧶 a hobby knitting</li>
                </ul>
            </div>
            <div class="info-box card">
                <h3>I like...</h3>
                <ul>
                    <li>👥 meet many people</li>
                    <li>🎧 listen to music</li>
                    <li>🏃‍♀️ jogging</li>
                </ul>
            </div>
        </section>

        <section class="projects-section">
            <h2>주원의 소소한 일상 갤러리</h2>
            <div class="project-grid">
                <div class="project-item card">
                    <img src="images/university.jpg" alt="대학교">
                    <p>나의 캠퍼스 라이프</p>
                </div>
                <div class="project-item card">
                    <img src="images/knitting.jpg" alt="뜨개질">
                    <p>포근한 뜨개질 타임</p>
                </div>
                <div class="project-item card">
                    <img src="images/puppy.jpg" alt="강아지">
                    <p>산책 친구, 귀요미 강아지</p>
                </div>
                <div class="project-item card">
                    <img src="images/jogging.jpg" alt="조깅">
                    <p>해변의 조깅</p>
                </div>
            </div>
        </section>

        <footer class="footer-section card">
            <div class="map-container">
                <h3>내가 좋아하는 해운대 🌊</h3>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3261.961314969242!2d129.1581458!3d35.1587031!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x356892e624c8c7f9%3A0x7b629fd65d4a13d7!2z7ZW07Jq064yAIO2Valid7Jew7Jql!5e0!3m2!1sko!2skr!4v1716380000000!5m2!1sko!2skr" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="contact-container">
                <h3>Connect with me</h3>
                <a href="https://www.instagram.com/busan_osil/" target="_blank" class="insta-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram Logo" class="insta-logo">
                    @busan_osil
                </a>
            </div>
        </footer>
    </div>
</body>
</html>
